name: Weekly org-chart update

# Runs Saturday 3:00 AM in Canberra. GitHub cron is UTC; Fri 17:00 UTC =
# Sat 03:00 AEST (UTC+10) / Sat 04:00 AEDT (UTC+11).
on:
  schedule:
    - cron: "0 17 * * 5"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write              # so the job can commit & push the refreshed data

concurrency:
  group: weekly-org-chart-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # Download the register separately with curl: --compressed asks for gzip
      # (~19 MB -> ~2 MB, so it doesn't stall from cloud IPs) and the retry /
      # speed-limit flags ride out a slow or briefly-stalled server.
      - name: Download directory.gov.au register
        run: |
          # directory.gov.au's server drops HTTP/2 streams from cloud IPs
          # (curl error 92: INTERNAL_ERROR). Force HTTP/1.1, allow a long slow
          # transfer, and retry. Accept only a non-empty file that looks like XML.
          ok=0
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt..."
            curl --http1.1 --compressed --fail --location \
                 --connect-timeout 30 --max-time 1500 --retry 2 \
                 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
                 -o directory_export.xml \
                 "https://www.directory.gov.au/sites/default/files/export.xml" && \
              [ -s directory_export.xml ] && \
              head -c 300 directory_export.xml | grep -qi "<" && { ok=1; break; }
            echo "Attempt $attempt failed; waiting 30s..."
            sleep 30
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Could not download directory.gov.au register after retries."
            exit 1
          fi
          ls -la directory_export.xml

      # Rebuild the structured charts (divisions/branches + SES people). No
      # --refresh: it parses the file curl just downloaded. Matching is fetched
      # live from the corporate-plans dashboard.
      - name: Rebuild structured charts
        run: python scrape_org_charts.py

      # Re-download the curated published-PDF org charts (the major departments).
      # Crawler-found PDFs are preserved as-is so a flaky cloud re-crawl can't
      # silently drop them.
      - name: Refresh published org-chart PDFs
        run: python find_org_chart_pdfs.py --overrides-only --workers 8

      # Commit only the generated data (not the ~19 MB directory_export.xml cache).
      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add org_charts
          if git diff --cached --quiet; then
            echo "No changes this week."
          else
            git commit -m "Weekly org-chart update ($(date -u +%Y-%m-%d))"
            git push
          fi
